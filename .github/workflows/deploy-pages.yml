name: Deploy to JOllars.github.io

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "user-site-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy folder to user site
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TO_USER_SITE_TOKEN }}
          external_repository: JOllars/JOllars.github.io
          publish_branch: main
          publish_dir: ./RollerDerbyScheduler
          destination_dir: RollerDerbyScheduler
          keep_files: true
          commit_message: "Deploy RollerDerbyScheduler from PrivatePublicStuff"
